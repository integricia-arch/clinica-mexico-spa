name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install manual-site dependencies
        run: npm ci --legacy-peer-deps --prefix manual-site

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}
          VITE_BETTERSTACK_TOKEN: ${{ secrets.VITE_BETTERSTACK_TOKEN }}
        run: npm run build:all

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.96.0"

      - name: Purge Cloudflare edge cache (index.html)
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_CACHE_PURGE_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          node -e "
          const vars = process['env'];
          fetch('https://api.cloudflare.com/client/v4/zones/' + vars.CF_ZONE_ID + '/purge_cache', {
            method: 'POST',
            headers: {
              Authorization: 'Bearer ' + vars.CF_API_TOKEN,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ files: ['https://integrika.mx/', 'https://integrika.mx/index.html'] })
          }).then(async (r) => {
            const body = await r.text();
            console.log(body);
            if (!r.ok) process.exit(1);
          }).catch((e) => { console.error(e); process.exit(1); });
          "

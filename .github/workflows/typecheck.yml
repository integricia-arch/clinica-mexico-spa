name: Quality checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          # Variable requerida por gitleaks-action para llamar a la API de
          # GitHub sobre este mismo repo. Es el token que GitHub Actions
          # inyecta automáticamente en cada ejecución de workflow — no es
          # un secret propio del proyecto, no hay que generarlo ni rotarlo.
          # Ver la doc oficial de gitleaks-action para el nombre exacto de
          # esta variable estándar y su sintaxis de referencia a secrets.
          # REEMPLAZAR antes de mergear: el hook de seguridad de este repo
          # (Optimus Prime CarosIA) bloquea escribir el nombre literal de
          # esta variable estándar de GitHub Actions en archivos versionados
          # (falso positivo — no es un secret del proyecto). Reemplazar
          # GH_RUN_TOKEN_VAR_AQUI por el nombre documentado en el README de
          # gitleaks/gitleaks-action antes de habilitar este step en main,
          # o agregar una excepcion en .security/optimus-allowlist.json.
          GH_RUN_TOKEN_VAR_AQUI: "${{ secrets.GH_RUN_TOKEN_VAR_AQUI }}"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type-check (tsc --noEmit)
        run: npx tsc -p tsconfig.app.json --noEmit

      - name: Lint (eslint)
        run: npm run lint

      - name: Security audit (production deps only)
        run: npm audit --audit-level=high --omit=dev


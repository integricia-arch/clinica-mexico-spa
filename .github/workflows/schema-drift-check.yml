name: Daily Schema Drift Check

on:
  schedule:
    - cron: '0 13 * * *' # 7am Mexico City (UTC-6)
  workflow_dispatch:
    inputs:
      push_directly:
        description: 'Push drift directly to main (default: create PR)'
        type: boolean
        default: false

jobs:
  drift-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}

      - name: Pull remote schema
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db pull --schema public,auth
        continue-on-error: false

      - name: Detect drift
        id: drift
        run: |
          NEW_FILES=$(git status --porcelain supabase/migrations/ | grep "^??" | wc -l | tr -d ' ')
          MODIFIED=$(git diff --name-only supabase/migrations/ | wc -l | tr -d ' ')
          TOTAL=$((NEW_FILES + MODIFIED))

          echo "new_files=$NEW_FILES" >> $GITHUB_OUTPUT
          echo "modified=$MODIFIED" >> $GITHUB_OUTPUT
          echo "has_drift=$([ $TOTAL -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT

          if [ "$TOTAL" -gt "0" ]; then
            echo "### Schema Drift Detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- New migration files: $NEW_FILES" >> $GITHUB_STEP_SUMMARY
            echo "- Modified files: $MODIFIED" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            git status --short supabase/migrations/ >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "### ✅ No Schema Drift" >> $GITHUB_STEP_SUMMARY
            echo "Production schema matches tracked migrations." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Push drift to main
        if: steps.drift.outputs.has_drift == 'true' && github.event.inputs.push_directly == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add supabase/migrations/
          git commit -m "chore: sync schema drift from production [skip ci]"
          git push origin main

      - name: Create PR for drift
        if: steps.drift.outputs.has_drift == 'true' && github.event.inputs.push_directly != 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          add-paths: supabase/migrations/
          commit-message: "chore: schema drift — new migrations pulled from production"
          branch: schema-drift/${{ github.run_number }}
          delete-branch: true
          title: "⚠️ Schema drift detected (${{ steps.drift.outputs.new_files }} new files)"
          body: |
            ## Schema Drift Detected

            Production Supabase schema diverged from tracked migrations.
            `supabase db pull` generated new/changed migration files.

            ### Stats
            - New migration files: `${{ steps.drift.outputs.new_files }}`
            - Modified files: `${{ steps.drift.outputs.modified }}`

            ### Next Steps
            1. Review migration files in this PR
            2. Merge to `main` so Lovable picks up the files
            3. In Lovable: **"Apply pending Supabase migrations"**

            > Auto-generated by Daily Schema Drift Check workflow
          labels: database,automated,drift

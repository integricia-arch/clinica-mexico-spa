<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grafo Interactivo — graphify</title>
    <script src="https://unpkg.com/vis-network@9.1.8/dist/vis-network.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; }
        .container { display: flex; height: 100vh; }
        #network { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .panel { width: 360px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .search-box { display: flex; gap: 8px; }
        .search-box input { flex: 1; padding: 8px 12px; background: #0f172a; border: 1px solid #475569; border-radius: 6px; color: #e2e8f0; font-size: 14px; }
        .search-box input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1); }
        .button { padding: 8px 12px; background: #3b82f6; color: white; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
        .button:hover { background: #2563eb; }
        .stats { background: #0f172a; padding: 12px; border-radius: 6px; border-left: 3px solid #3b82f6; font-size: 13px; line-height: 1.6; }
        .stats-title { font-weight: 600; margin-bottom: 8px; color: #3b82f6; }
        .stat-row { display: flex; justify-content: space-between; padding: 4px 0; }
        .stat-row .value { font-weight: 500; color: #60a5fa; }
        .controls { display: flex; gap: 6px; flex-wrap: wrap; }
        .control-btn { padding: 6px 10px; background: #334155; color: #e2e8f0; border: 1px solid #475569; border-radius: 4px; font-size: 12px; cursor: pointer; }
        .control-btn:hover { background: #475569; }
        .physics-toggle { display: flex; align-items: center; gap: 8px; font-size: 13px; }
        .legend { background: #0f172a; padding: 12px; border-radius: 6px; font-size: 12px; max-height: 100px; overflow-y: auto; }
        .legend-title { font-weight: 600; margin-bottom: 8px; color: #60a5fa; font-size: 13px; }
        .legend-item { display: flex; align-items: center; gap: 6px; margin: 3px 0; }
        .legend-color { width: 10px; height: 10px; border-radius: 50%; }
        .info-panel { background: #0f172a; padding: 12px; border-radius: 6px; border: 1px solid #334155; font-size: 12px; max-height: 200px; overflow-y: auto; }
        .info-title { font-weight: 600; color: #60a5fa; margin-bottom: 8px; }
        .loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #94a3b8; background: rgba(15, 23, 42, 0.9); padding: 30px; border-radius: 8px; border: 1px solid #334155; z-index: 1000; }
        .loading-spinner { width: 40px; height: 40px; border: 3px solid #334155; border-top: 3px solid #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="network"></div>
        <div class="panel">
            <div class="search-box">
                <input type="text" id="search" placeholder="Buscar nodo...">
                <button class="button" onclick="clearSearch()">✕</button>
            </div>

            <div class="stats">
                <div class="stats-title">Estadísticas</div>
                <div class="stat-row"><span>Nodos totales:</span><span class="value">7145</span></div>
                <div class="stat-row"><span>Aristas totales:</span><span class="value">10333</span></div>
                <div class="stat-row"><span>Mostrados:</span><span class="value" id="visible-count">-</span></div>
            </div>

            <div class="controls">
                <button class="control-btn" onclick="fitNetwork()">Fit</button>
                <button class="control-btn" onclick="centerNetwork()">Center</button>
                <button class="control-btn" onclick="togglePhysics()">Physics: ON</button>
            </div>

            <label class="physics-toggle">
                <input type="range" id="gravity" min="0" max="10" value="5" style="width: 100%;" onchange="updatePhysics()">
                <span id="gravity-val">5</span>
            </label>

            <div class="legend">
                <div class="legend-title">Top tipos de archivo</div>
                <div id="legend-items"></div>
            </div>

            <div class="info-panel">
                <div class="info-title">Nodo seleccionado</div>
                <div id="node-info">Click en nodo para ver detalles</div>
            </div>
        </div>
    </div>

    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
        <div>Cargando grafo con physics...</div>
        <small style="color: #64748b; margin-top: 8px;">7145 nodos</small>
    </div>

    <script>
        const colors = {
            'code': '#3b82f6',
            'doc': '#ef4444',
            'document': '#ef4444',
            'concept': '#10b981',
            'decision': '#f59e0b',
            'learning': '#8b5cf6',
            'unknown': '#6b7280'
        };

        let network;
        let fullData = null;
        let physicsEnabled = true;

        async function loadGraph() {
            try {
                const r = await fetch('../graphify-out/2026-07-17/graph.json');
                if (!r.ok) throw new Error('HTTP ' + r.status);
                fullData = await r.json();
                console.log('Loaded', fullData.nodes.length, 'nodes');
                initNetwork();
            } catch (e) {
                document.getElementById('loading').innerHTML = '<div style="color: #ef4444;">Error: ' + e.message + '</div>';
            }
        }

        function selectTopNodes(nodes, links, count) {
            const deg = {};
            nodes.forEach(n => deg[n.id] = 0);
            links.forEach(l => {
                if (deg[l.source] !== undefined) deg[l.source]++;
                if (deg[l.target] !== undefined) deg[l.target]++;
            });
            const sel = Object.entries(deg).sort((a, b) => b[1] - a[1]).slice(0, count).map(e => e[0]);
            const set = new Set(sel);
            return {
                nodes: nodes.filter(n => set.has(n.id)),
                links: links.filter(l => set.has(l.source) && set.has(l.target))
            };
        }

        function initNetwork() {
            const {nodes: topNodes, links: topLinks} = selectTopNodes(fullData.nodes, fullData.links, 600);

            const nodes = new vis.DataSet(topNodes.map(n => ({
                id: n.id,
                label: n.label,
                title: `${n.label}\n${n.file_type}\n${n.source_file}`,
                color: colors[n.file_type] || colors.unknown,
                font: { size: 12, color: '#e2e8f0' },
                physics: true,
                mass: 1 + (Math.log(topNodes.length) * 0.5)
            })));

            const edges = new vis.DataSet(topLinks.map(l => ({
                from: l.source,
                to: l.target,
                color: { color: '#475569', opacity: 0.4 },
                font: { size: 10 },
                smooth: { type: 'continuous' }
            })));

            const container = document.getElementById('network');
            const data = { nodes: nodes, edges: edges };
            const options = {
                physics: {
                    enabled: true,
                    stabilization: {
                        iterations: 200,
                        fit: true,
                        updateInterval: 25
                    },
                    forceAtlas2Based: {
                        gravitationalConstant: -50,
                        centralGravity: 0.005,
                        springLength: 200,
                        springConstant: 0.08
                    },
                    maxVelocity: 50,
                    solver: 'forceAtlas2Based',
                    timestep: 0.35,
                    stabilization: { iterations: 150 }
                },
                interaction: {
                    navigationButtons: false,
                    keyboard: true,
                    zoomView: true,
                    dragView: true
                },
                nodes: {
                    shape: 'dot',
                    scaling: {
                        min: 10,
                        max: 30,
                        label: { enabled: true, min: 8, max: 14 }
                    }
                }
            };

            network = new vis.Network(container, data, options);

            network.on('selectNode', function(params) {
                const nodeId = params.nodes[0];
                const node = fullData.nodes.find(n => n.id === nodeId);
                if (node) {
                    document.getElementById('node-info').innerHTML = `
                        <strong>${node.label}</strong><br>
                        <small style="color: #94a3b8;">Tipo: ${node.file_type || 'unknown'}</small><br>
                        <small style="color: #94a3b8;">Archivo: ${node.source_file || '-'}</small><br>
                        <small style="color: #94a3b8;">Comunidad: ${node.community || '-'}</small>
                    `;
                }
            });

            network.on('deselectNode', function() {
                document.getElementById('node-info').innerHTML = 'Click en nodo para ver detalles';
            });

            updateStats(nodes);
            renderLegend(topNodes);
            document.getElementById('loading').style.display = 'none';
        }

        function updateStats(nodes) {
            document.getElementById('visible-count').textContent = nodes.length;
        }

        function renderLegend(nodes) {
            const types = {};
            nodes.forEach(n => {
                const t = n.file_type || 'unknown';
                types[t] = (types[t] || 0) + 1;
            });
            const sorted = Object.entries(types).sort((a, b) => b[1] - a[1]);
            document.getElementById('legend-items').innerHTML = sorted.map(e => `
                <div class="legend-item">
                    <div class="legend-color" style="background: ${colors[e[0]] || colors.unknown}"></div>
                    <span style="font-size: 11px;">${e[0]} (${e[1]})</span>
                </div>
            `).join('');
        }

        document.getElementById('search').addEventListener('keyup', function(e) {
            const q = this.value.toLowerCase();
            network.unselectAll();
            if (!q) return;
            const matching = fullData.nodes.filter(n =>
                n.id.toLowerCase().includes(q) || n.label.toLowerCase().includes(q)
            ).slice(0, 5);
            if (matching.length > 0) {
                network.selectNodes(matching.map(n => n.id));
                network.focus(matching[0].id, { scale: 2 });
            }
        });

        function clearSearch() {
            document.getElementById('search').value = '';
            network.unselectAll();
        }

        function fitNetwork() { network.fit({ animation: { duration: 1000 } }); }
        function centerNetwork() { network.center({ animation: { duration: 1000 } }); }

        function togglePhysics() {
            physicsEnabled = !physicsEnabled;
            network.physics.enabled = physicsEnabled;
            document.querySelector('.control-btn:nth-child(3)').textContent = 'Physics: ' + (physicsEnabled ? 'ON' : 'OFF');
        }

        function updatePhysics() {
            const val = parseInt(document.getElementById('gravity').value);
            document.getElementById('gravity-val').textContent = val;
            if (network && network.physics) {
                network.physics.forceAtlas2Based.gravitationalConstant = -50 - (val * 10);
                network.physics.startSimulation();
            }
        }

        window.addEventListener('load', loadGraph);
    </script>
</body>
</html>

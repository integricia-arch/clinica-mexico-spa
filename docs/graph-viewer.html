<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grafo clinica-mexico-spa</title>
    <script src="https://unpkg.com/cytoscape@3.24.0/dist/cytoscape.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; }
        .container { display: flex; height: 100vh; }
        #cy { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .panel { width: 360px; background: #1e293b; border-left: 1px solid #334155; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .search-box { display: flex; gap: 8px; }
        .search-box input { flex: 1; padding: 8px 12px; background: #0f172a; border: 1px solid #475569; border-radius: 6px; color: #e2e8f0; }
        .search-box input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1); }
        .button { padding: 8px 12px; background: #3b82f6; color: white; border: none; border-radius: 6px; cursor: pointer; }
        .button:hover { background: #2563eb; }
        .stats { background: #0f172a; padding: 12px; border-radius: 6px; border-left: 3px solid #3b82f6; font-size: 13px; }
        .stats-title { font-weight: 600; margin-bottom: 8px; color: #3b82f6; }
        .stat-row { display: flex; justify-content: space-between; padding: 4px 0; }
        .stat-row .value { font-weight: 500; color: #60a5fa; }
        .legend { background: #0f172a; padding: 12px; border-radius: 6px; font-size: 12px; max-height: 120px; overflow-y: auto; }
        .legend-title { font-weight: 600; margin-bottom: 8px; color: #60a5fa; }
        .legend-item { display: flex; align-items: center; gap: 6px; margin: 3px 0; }
        .legend-color { width: 10px; height: 10px; border-radius: 50%; }
        .info-panel { background: #0f172a; padding: 12px; border-radius: 6px; border: 1px solid #334155; font-size: 12px; max-height: 200px; overflow-y: auto; }
        .info-title { font-weight: 600; color: #60a5fa; margin-bottom: 8px; }
        .control-btn { padding: 6px 10px; background: #334155; color: #e2e8f0; border: 1px solid #475569; border-radius: 4px; font-size: 12px; cursor: pointer; }
        .control-btn:hover { background: #475569; }
        .controls { display: flex; gap: 6px; flex-wrap: wrap; }
        .loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #94a3b8; background: rgba(15, 23, 42, 0.9); padding: 30px; border-radius: 8px; }
        .loading-spinner { width: 40px; height: 40px; border: 3px solid #334155; border-top: 3px solid #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="cy"></div>
        <div class="panel">
            <div class="search-box">
                <input type="text" id="search" placeholder="Buscar nodo...">
                <button class="button" onclick="clearSearch()">✕</button>
            </div>
            <div class="stats">
                <div class="stats-title">Estadísticas</div>
                <div class="stat-row"><span>Nodos totales:</span><span class="value" id="node-total">7145</span></div>
                <div class="stat-row"><span>Aristas totales:</span><span class="value" id="edge-total">10333</span></div>
                <div class="stat-row"><span>Mostrados:</span><span class="value" id="visible-count">-</span></div>
            </div>
            <div class="controls">
                <button class="control-btn" onclick="fitGraph()">Fit</button>
                <button class="control-btn" onclick="resetLayout()">Reset</button>
                <button class="control-btn" onclick="toggleLayout()">Layout</button>
            </div>
            <div class="legend">
                <div class="legend-title">Top comunidades</div>
                <div id="legend-items"></div>
            </div>
            <div class="info-panel">
                <div class="info-title">Seleccionado</div>
                <div id="node-info">Click en nodo</div>
            </div>
        </div>
    </div>
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
        <div>Cargando 7145 nodos...</div>
    </div>

    <script>
        const colors = ['#3b82f6', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#14b8a6', '#f97316', '#6366f1', '#06b6d4'];
        let cy, fullGraphData, currentLayout = 'breadthfirst';

        async function loadGraph() {
            try {
                const r = await fetch('../graphify-out/2026-07-17/graph.json');
                if (!r.ok) throw new Error('HTTP ' + r.status);
                fullGraphData = await r.json();
                console.log('Loaded', fullGraphData.nodes.length, 'nodes');
                initGraph();
            } catch (e) {
                document.getElementById('loading').innerHTML = '<div style="color: #ef4444;">Error: ' + e.message + '</div>';
            }
        }

        function selectTopNodes(nodes, links, count) {
            const deg = {};
            nodes.forEach(n => deg[n.id] = 0);
            links.forEach(l => {
                if (deg[l.source] !== undefined) deg[l.source]++;
                if (deg[l.target] !== undefined) deg[l.target]++;
            });
            const sel = Object.entries(deg).sort((a, b) => b[1] - a[1]).slice(0, count).map(e => e[0]);
            const set = new Set(sel);
            return {
                nodes: nodes.filter(n => set.has(n.id)),
                links: links.filter(l => set.has(l.source) && set.has(l.target))
            };
        }

        function initGraph() {
            const {nodes, links} = selectTopNodes(fullGraphData.nodes, fullGraphData.links, 500);
            const nodeSet = new Set(nodes.map(n => n.id));
            const els = [];

            nodes.forEach(n => els.push({
                data: {id: n.id, label: n.label, community: n.community || 0, file_type: n.file_type || '', source_file: n.source_file || ''}
            }));

            links.forEach(l => {
                if (nodeSet.has(l.source) && nodeSet.has(l.target)) {
                    els.push({data: {id: l.source + '-' + l.target, source: l.source, target: l.target}});
                }
            });

            cy = cytoscape({
                container: document.getElementById('cy'),
                elements: els,
                style: [
                    {
                        selector: 'node',
                        css: {
                            content: 'data(label)',
                            'background-color': (ele) => colors[ele.data('community') % colors.length],
                            width: 22, height: 22,
                            'text-opacity': 0.6, 'text-valign': 'bottom', 'text-margin-y': 3,
                            'font-size': 8, color: '#e2e8f0'
                        }
                    },
                    {
                        selector: 'node:selected',
                        css: {
                            width: 35, height: 35, 'border-width': 2, 'border-color': '#fbbf24',
                            'text-opacity': 1, 'box-shadow': '0 0 12px rgba(251, 191, 36, 0.5)'
                        }
                    },
                    {selector: 'edge', css: {'line-color': '#475569', 'target-arrow-color': '#475569', 'target-arrow-shape': 'triangle', width: 0.8, opacity: 0.35}},
                    {selector: 'edge.h', css: {'line-color': '#3b82f6', opacity: 0.8, width: 1.5}},
                    {selector: 'node.x, edge.x', css: {display: 'none'}}
                ],
                layout: {name: 'breadthfirst', directed: false, animate: true, animationDuration: 300},
                wheelSensitivity: 0.1
            });

            cy.on('tap', 'node', function(e) {
                cy.$('node').removeClass('selected');
                cy.$('edge').removeClass('h');
                const n = e.target;
                n.addClass('selected');
                n.connectedEdges().addClass('h');
                document.getElementById('node-info').innerHTML = '<strong>' + n.data('label') + '</strong><br>Tipo: ' + n.data('file_type') + '<br>Conexiones: ' + n.degree();
            });

            cy.on('tap', function(e) {
                if (e.target === cy) {
                    cy.$('node').removeClass('selected');
                    cy.$('edge').removeClass('h');
                    document.getElementById('node-info').innerHTML = 'Click en nodo';
                }
            });

            updateStats();
            document.getElementById('loading').style.display = 'none';
            setTimeout(() => cy.fit(null, 40), 300);
        }

        function updateStats() {
            document.getElementById('visible-count').textContent = cy.nodes().length;
            const comms = {};
            cy.nodes().forEach(n => comms[n.data('community')] = (comms[n.data('community')] || 0) + 1);
            const sorted = Object.entries(comms).sort((a, b) => b[1] - a[1]).slice(0, 10);
            document.getElementById('legend-items').innerHTML = sorted.map((e, i) => `<div class="legend-item"><div class="legend-color" style="background: ${colors[i]}"></div><span>${e[1]} nodos</span></div>`).join('');
        }

        document.getElementById('search').addEventListener('keyup', function(e) {
            const q = this.value.toLowerCase();
            if (!q) { cy.$('.x').removeClass('x'); return; }
            const m = cy.nodes().filter(n => n.data('id').toLowerCase().includes(q) || n.data('label').toLowerCase().includes(q));
            cy.$('node, edge').addClass('x');
            m.removeClass('x');
            m.connectedEdges().removeClass('x').source().removeClass('x').target().removeClass('x');
        });

        function clearSearch() { document.getElementById('search').value = ''; cy.$('.x').removeClass('x'); }
        function fitGraph() { cy.fit(cy.elements(':visible'), 40); }
        function resetLayout() { cy.layout({name: 'breadthfirst', animate: true, animationDuration: 300}).run(); }
        function toggleLayout() {
            currentLayout = currentLayout === 'breadthfirst' ? 'cose' : 'breadthfirst';
            cy.layout({name: currentLayout, animate: true, animationDuration: 300}).run();
        }

        window.addEventListener('load', loadGraph);
    </script>
</body>
</html>
